<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Horarios - Vista Calendario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        /* Estilos para el Loader */
        .loader {
            width: 48px; height: 48px; border: 5px solid #EEE;
            border-bottom-color: #0d6efd; border-radius: 50%;
            display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-area { display: none; text-align: center; margin: 20px 0; }

        /* Estilos del Calendario Tipo Google Calendar */
        .calendar-container { margin-top: 30px; margin-bottom: 50px; }
        .grade-title { background-color: #343a40; color: white; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        
        .calendar-table { table-layout: fixed; width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid #ddd; }
        .calendar-table th, .calendar-table td { border: 1px solid #eee; text-align: center; vertical-align: middle; padding: 0; overflow: hidden;}
        .calendar-table td { height: 40px; }
        
        /* Columna de horas fija */
        .time-col { width: 60px; background-color: #f8f9fa; font-size: 0.8rem; color: #6c757d; font-weight: bold; border-right: 2px solid #ddd !important; }
        .calendar-table thead th { background-color: #f8f9fa; padding: 10px; border-bottom: 2px solid #ddd; }

        /* Estilos de las celdas de clase (Eventos) */
        .session-cell { 
            background-color: #e3f2fd; /* Azul claro por defecto */
            border: 1px solid #90caf9;
            border-radius: 4px;
            margin: 2px;
            padding: 5px;
            font-size: 0.75rem;
            line-height: 1.2;
            height: calc(100% - 4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .session-title { font-weight: bold; color: #0d47a1; margin-bottom: 2px; }
        .session-info { color: #1565c0; font-size: 0.7rem; }
        
        /* Colores aleatorios para asignaturas */
        .bg-cat-1 { background-color: #e3f2fd; border-color: #90caf9; }
        .bg-cat-2 { background-color: #e8f5e9; border-color: #a5d6a7; }
        .bg-cat-3 { background-color: #fff3e0; border-color: #ffcc80; }
        .bg-cat-4 { background-color: #f3e5f5; border-color: #ce93d8; }
        .bg-cat-5 { background-color: #efebe9; border-color: #bcaaa4; }
        
    </style>
</head>
<body class="container-fluid px-4 mt-5">
    <div class="card p-4 shadow">
        <h2>Panel de Control del Algoritmo</h2>
        <p class="text-muted">Se ejecutarán 20 intentos. La vista final se organizará por Carrera/Grado.</p>
        
        <button id="btnEjecutar" class="btn btn-primary w-25">Iniciar Generación</button>

        <div id="loading-area">
            <div class="loader mt-3"></div>
            <p class="mt-2">Procesando intento: <strong id="contador">0</strong> / 20</p>
        </div>
    </div>

    <div id="calendarios-grados" class="mt-4"></div>

    <script>
        // Configuración de horas y días
        const START_HOUR = 8;
        const END_HOUR = 14; // Límite de tus slots actuales (0-11)
        const SLOTS_PER_HOUR = 2; // Slots de 30 min
        const TOTAL_SLOTS = (END_HOUR - START_HOUR) * SLOTS_PER_HOUR;
        
        const diasSemana = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        const diasNombresES = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];

        // UI Elements
        const btn = document.getElementById('btnEjecutar');
        const loadingArea = document.getElementById('loading-area');
        const contadorText = document.getElementById('contador');
        const contenedorCalendarios = document.getElementById('calendarios-grados');

        // Mapa de colores para asignaturas
        const asignaturaColores = {};
        let colorCounter = 1;

        btn.onclick = function() {
            // UI Reset
            btn.disabled = true;
            loadingArea.style.display = 'block';
            contenedorCalendarios.innerHTML = "";
            contadorText.innerText = "0";
            Object.keys(asignaturaColores).forEach(key => delete asignaturaColores[key]);
            colorCounter = 1;

            // Conexión SSE
            const eventSource = new EventSource('/solver/progress');

            eventSource.onmessage = function(e) {
                const data = JSON.parse(e.data);
                contadorText.innerText = data.progreso;

                if (data.error) {
                    contenedorCalendarios.innerHTML = `<div class='alert alert-danger'>Error: ${data.error}</div>`;
                    eventSource.close();
                    btn.disabled = false;
                    loadingArea.style.display = 'none';
                    return;
                }

                if (data.progreso === 20) {
                    eventSource.close();
                    btn.disabled = false;
                    loadingArea.style.display = 'none';
                    
                    if (data.horario && data.horario.length > 0) {
                        procesarYDibujarCalendarios(data.horario);
                    } else {
                        contenedorCalendarios.innerHTML = "<div class='alert alert-warning text-center'>No se encontró solución válida en 20 intentos.</div>";
                    }
                }
            };

            eventSource.onerror = function() {
                eventSource.close();
                btn.disabled = false;
                loadingArea.style.display = 'none';
                console.error("Error de conexión SSE.");
            };
        };

        function procesarYDibujarCalendarios(horario) {
            // 1. Identificar todos los grados únicos
            const gradosSet = new Set();
            horario.forEach(sesion => {
                sesion.grades.forEach(grado => gradosSet.add(grado));
            });
            const listaGrados = Array.from(gradosSet).sort();

            // 2. Crear un calendario para cada grado
            listaGrados.forEach(grado => {
                // Filtrar sesiones que pertenecen a este grado
                const sesionesGrado = horario.filter(sesion => sesion.grades.includes(grado));
                if (sesionesGrado.length > 0) {
                    crearEstructuraCalendario(grado, sesionesGrado);
                }
            });
        }

        function crearEstructuraCalendario(grado, sesiones) {
            let html = `
                <div class="calendar-container card shadow-sm p-3">
                    <h3 class="grade-title text-center">Grado: ${grado}</h3>
                    <table class="calendar-table">
                        <thead>
                            <tr>
                                <th class="time-col">Hora</th>
                                ${diasNombresES.map(dia => `<th>${dia}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
            `;

            // Crear una matriz vacía para rastrear celdas ocupadas por rowspan
            const matrizOcupada = Array(TOTAL_SLOTS).fill().map(() => Array(diasSemana.length).fill(false));

            // Generar filas por cada slot de 30 min
            for (let slotIdx = 0; slotIdx < TOTAL_SLOTS; slotIdx++) {
                const horaPaquete = calcularHoraHtml(slotIdx);
                html += `<tr>`;
                
                // Columna de hora (solo se muestra en el primer slot de cada hora para limpieza, o en todos)
                html += `<td class="time-col">${horaPaquete}</td>`;

                for (let diaIdx = 0; diaIdx < diasSemana.length; diaIdx++) {
                    const diaEn = diasSemana[diaIdx];
                    
                    // Si la celda ya está ocupada por un rowspan de una sesión anterior, saltar
                    if (matrizOcupada[slotIdx][diaIdx]) {
                        continue;
                    }

                    // Buscar si hay una sesión que EMPIEZA en este slot y día
                    const sesion = sesiones.find(s => s.dia === diaEn && s.slot === slotIdx);

                    if (sesion) {
                        const duracion = sesion.duracion;
                        const colorClass = obtenerColorAsignatura(sesion.curso);
                        
                        // Marcar las celdas futuras como ocupadas en la matriz
                        for (let d = 0; d < duracion; d++) {
                            if (slotIdx + d < TOTAL_SLOTS) {
                                matrizOcupada[slotIdx + d][diaIdx] = true;
                            }
                        }

                        // Crear la celda con rowspan
                        html += `
                            <td rowspan="${duracion}">
                                <div class="session-cell ${colorClass}">
                                    <div class="session-title">${sesion.curso}</div>
                                    <div class="session-info">${sesion.aula} (${sesion.edificio})</div>
                                </div>
                            </td>
                        `;
                    } else {
                        // Celda vacía
                        html += `<td></td>`;
                    }
                }
                html += `</tr>`;
            }

            html += `
                        </tbody>
                    </table>
                </div>
            `;

            contenedorCalendarios.innerHTML += html;
        }

        // Funciones Auxiliares
        function calcularHoraHtml(slotIdx) {
            // slot 0 --> 08:00
            // slot 1 --> 08:30
            const totalMinutosDesdeOcho = slotIdx * 30;
            const hora = START_HOUR + Math.floor(totalMinutosDesdeOcho / 60);
            const minutos = totalMinutosDesdeOcho % 60;
            return `${String(hora).padStart(2, '0')}:${String(minutos).padStart(2, '0')}`;
        }

        function obtenerColorAsignatura(curso) {
            if (!asignaturaColores[curso]) {
                asignaturaColores[curso] = `bg-cat-${colorCounter}`;
                colorCounter = (colorCounter % 5) + 1; // Ciclar entre 5 colores
            }
            return asignaturaColores[curso];
        }

    </script>
</body>
</html>

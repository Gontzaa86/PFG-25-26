<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Generación de Horarios - Deusto{% endblock %}</title>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/deusto.ico') }}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
            <a class="navbar-brand" href="{{ url_for('inicio') }}">Deusto Horarios</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav">
                    <div class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Visualización Datos
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="{{ url_for('lista_profesores') }}">Profesores</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{{ url_for('lista_aulas') }}">Aulas</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="{{ url_for('lista_grados') }}">Grados y Asignaturas</a></li>
                        </ul>
                    </div>

                    <a class="nav-link btn btn-primary text-white ms-lg-3" href="{{ url_for('vista_stream') }}">Generar Horario</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Contenido -->
    <main class="py-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="text-center py-3 border-top">
        <p>&copy; Deusto - Aplicación de Generación de Horarios</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JS propio -->
    {% block scripts %}
    {% endblock %}
</body>
</html>
